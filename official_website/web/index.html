<!DOCTYPE html>
<html>
<head>

  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="official_website">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>official_website</title>
  <link rel="manifest" href="manifest.json">

  <!-- Tencent Cloud IM SDK for Web -->
  <script src="node_modules/tim-upload-plugin/index.js"></script>
  <script src="node_modules/@tencentcloud/chat/index.js"></script>
  <script src="node_modules/@tencentcloud/chat/modules/group-module.js"></script>
  <script src="node_modules/@tencentcloud/chat/modules/relationship-module.js"></script>
  <script src="node_modules/@tencentcloud/chat/modules/signaling-module.js"></script>

  <!-- TIM 消息监听器设置 -->
  <script>
    // 全局回调函数，将被 Dart 设置
    let onTIMMessageReceivedCallback = null;

    // 供 Dart 调用的函数，设置消息接收回调
    function onTIMMessageReceived(callback) {
      onTIMMessageReceivedCallback = callback;
      console.log('TIM 消息回调已设置');
    }

    // TIM 实例引用（由 Dart 创建）
    let timInstance = null;

    // 供 Dart 调用的函数，设置 TIM 实例
    function setTimInstance(tim) {
      timInstance = tim;

      // 注册消息接收监听器
      timInstance.on(TencentCloudChat.EVENT.MESSAGE_RECEIVED, function(event) {
        console.log('收到 TIM 消息:', event);

        // 解析消息数据并转换为扁平化的对象数组
        const messages = event.data.map(function(msg) {
          const msgObj = {
            msgID: msg.msgID || '',
            type: msg.type || 'TIMTextElem',
            from: msg.from || '',
            to: msg.to || '',
            timestamp: (msg.timestamp || Date.now() / 1000).toString()
          };

          // 如果是文本消息，直接添加文本内容
          if (msg.type === 'TIMTextElem' && msg.payload && msg.payload.text) {
            msgObj.text = msg.payload.text;
          }

          return msgObj;
        });

        // 调用全局处理器
        _onMessageReceivedHandler(messages);
      });

      console.log('TIM 事件监听器已注册');
    }

    // 全局消息处理器（由 Dart 定义，这里保留引用）
    let _onMessageReceivedHandler = function(messages) {
      console.log('处理消息数组:', messages);
      // 调用 Dart 回调
      if (onTIMMessageReceivedCallback && typeof onTIMMessageReceivedCallback === 'function') {
        onTIMMessageReceivedCallback(messages);
      }
    };

    // 供 Dart 调用的辅助函数，从对象获取属性
    function _getPropertyFromJS(obj, prop) {
      if (obj && typeof obj === 'object') {
        return obj[prop] || null;
      }
      return null;
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
