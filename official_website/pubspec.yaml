name: official_website
description: "Official website built with Flutter Web - Modern, modular, and high-performance"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI & Animation
  flutter_bloc: ^8.1.6
  go_router: ^14.6.2
  lottie: ^3.1.3
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  responsive_framework: ^1.5.1

  # Network & Data
  dio: ^5.7.0
  retrofit: ^4.4.2
  json_annotation: ^4.9.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1

  # Storage
  shared_preferences: ^2.3.4
  hive_flutter: ^1.1.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.4.4

  # Utilities
  dartz: ^0.10.1
  equatable: ^2.0.5
  logger: ^2.5.0
  intl: ^0.19.0

  # Icons
  font_awesome_flutter: ^10.8.0
  flutter_svg: ^2.0.0
  qr_flutter: ^4.1.0

  # Video Player
  video_player: ^2.9.2
  flutter_quill: ^10.8.0
  image_picker: ^0.8.9
  carousel_slider: ^5.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  json_serializable: ^6.9.2
  retrofit_generator: ^9.1.5
  freezed: ^2.5.8

  # Testing
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/images/logo/
    - assets/images/banners/
    - assets/images/icons/
    - assets/animations/
    - assets/animations/lottie/
    - assets/apk/
    - assets/home_hero_video.mp4
    - assets/联系.png

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/custom_font_1.ttf
