<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
        }
        .version {
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .wechat-tip {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            display: none;
        }
        .wechat-tip.show {
            display: block;
        }
        .wechat-tip h3 {
            color: #856404;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .wechat-tip p {
            color: #856404;
            font-size: 14px;
            line-height: 1.6;
        }
        .download-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        .download-btn:hover {
            transform: scale(1.05);
        }
        .features {
            text-align: left;
            margin-top: 30px;
        }
        .feature-item {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            color: #666;
            font-size: 14px;
        }
        .feature-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📱</div>
        <h1>都达网络</h1>
        <p class="version">版本 1.0.0</p>
        
        <div class="wechat-tip" id="wechatTip">
            <h3>⚠️ 微信用户请注意</h3>
            <p>请点击右上角 <strong>···</strong> 选择<strong>"在浏览器打开"</strong><br>然后再点击下载按钮</p>
        </div>
        
        <a href="./assets/apk/app-release.apk" class="download-btn" id="downloadBtn">
            ⬇️ 立即下载
        </a>
        
        <div class="features">
            <div class="feature-item">✨ 高品质软件定制服务</div>
            <div class="feature-item">🔧 专业技术团队支持</div>
            <div class="feature-item">💬 7x24小时售后服务</div>
            <div class="feature-item">🚀 快速响应客户需求</div>
        </div>
    </div>

    <script>
        // 检测是否在微信中
        function isWechat() {
            return /micromessenger/i.test(navigator.userAgent);
        }
        
        // 页面加载时检测
        window.onload = function() {
            if (isWechat()) {
                document.getElementById('wechatTip').classList.add('show');
                document.getElementById('downloadBtn').style.pointerEvents = 'none';
                document.getElementById('downloadBtn').style.opacity = '0.5';
                document.getElementById('downloadBtn').textContent = '请在浏览器中打开';
            }
        };
    </script>
</body>
</html>
